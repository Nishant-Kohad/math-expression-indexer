name: math_expression_indexer
description: "A responsive web app for mathematical expression indexing from PDFs."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1

  # File picker (withData: true for web)
  file_picker: ^8.1.2

  # LaTeX math rendering
  flutter_math_fork: ^0.7.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
